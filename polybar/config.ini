[colors]
background = #282828
background-alt = #3c3836
foreground = #ebdbb2
primary = #d65d0e
secondary = #8fe3d2
alert = #cc241d
disabled = #7c6f64

red = #fb4934
green = #b8bb26
yellow = #fabd2f
blue = #83a598
purple = #d3869b
aqua = #8ec07c
orange = #fe8019

[bar/main]
width = 100%
height = 20pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

padding-left = 1
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "Noto Sans:size=10;2"

modules-left = xworkspaces
modules-center = xwindow
modules-right = date time

tray-position = right
tray-detached = false
tray-maxsize = 16
tray-background = ${colors.background}
tray-offset-x = 0
tray-offset-y = 0
tray-padding = 4
tray-scale = 1.0

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.orange}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1
label-occupied-foreground = ${colors.blue}

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

;----------------------------------------------------------

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-foreground = ${colors.aqua}

;----------------------------------------------------------

[module/date]
type = internal/date
interval = 1000

date = %Y-%m-%d
label =  %date%
label-foreground = ${colors.yellow}

;----------------------------------------------------------

[module/time]
type = internal/date
interval = 1

time = %H:%M:%S
label =  %time%
label-foreground = ${colors.green}

;----------------------------------------------------------

[module/systray]
type = internal/systray
tray-spacing = 8px
tray-size = 16pt

;==========================================================
; AYARLAR
;==========================================================

[settings]
screenchange-reload = true
pseudo-transparency = true
